<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}💰 Holding Company{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link rel="stylesheet" href="/static/style.css?v=5">
  {% block head %}{% endblock %}
</head>
<body>
<script>
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
</script>

<div class="layout">

  <!-- ── 사이드바 ── -->
  <nav class="sidebar">
    <a href="/portfolio" class="sidebar-brand" style="text-decoration:none;">💰 Holding Company</a>

    <!-- 자산관리 -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">자산관리</div>
      <a href="/assets"     class="sidebar-link {% if active == 'assets'     %}active{% endif %}">💼 자산 현황</a>
      <a href="/milestones" class="sidebar-link {% if active == 'milestones' %}active{% endif %}">🗺️ 마일스톤</a>
    </div>

    <!-- 부동산 -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">부동산</div>
      <a href="/realestate" class="sidebar-link {% if active == 'realestate' %}active{% endif %}">🏠 부동산 히스토리</a>
    </div>

    <!-- 해외 투자 -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">해외 투자</div>
      <a href="/"           class="sidebar-link {% if active == 'home'       %}active{% endif %}">🏠 홈</a>
      <a href="/calculator" class="sidebar-link {% if active == 'calculator' %}active{% endif %}">🧮 주주 지분 소득 계산기</a>
      <a href="/portfolio"  class="sidebar-link {% if active == 'portfolio'  %}active{% endif %}">📂 포트폴리오</a>
      <a href="/history"    class="sidebar-link {% if active == 'history'    %}active{% endif %}">📈 히스토리</a>
    </div>

    <div class="sidebar-footer">
      <span style="font-size:12px; color:var(--text2);">테마</span>
      <button class="theme-toggle" id="themeToggle" title="테마 전환">🌙</button>
    </div>
  </nav>

  <!-- ── 메인 콘텐츠 ── -->
  <main class="main-content">
    <div class="page-wrap">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>

<script>
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const btn = document.getElementById('themeToggle');
  btn.textContent = saved === 'dark' ? '☀️' : '🌙';
  btn.addEventListener('click', function() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    this.textContent = next === 'dark' ? '☀️' : '🌙';
  });
})();
</script>

</body>
</html>
