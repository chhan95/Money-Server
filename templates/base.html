<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}💰 Money{% endblock %}</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">💰 Money</a>
    <div style="display:flex; align-items:center; gap:6px;">
      <div class="nav-links">
        <a href="/"           class="nav-link {% if active == 'home'       %}active{% endif %}">홈</a>
        <a href="/calculator" class="nav-link {% if active == 'calculator' %}active{% endif %}">계산기</a>
        <a href="/portfolio"  class="nav-link {% if active == 'portfolio'  %}active{% endif %}">포트폴리오</a>
      </div>
      <button class="theme-toggle" id="themeToggle" title="테마 전환">🌙</button>
    </div>
  </div>
</nav>

<script>
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').textContent = saved === 'dark' ? '☀️' : '🌙';

  document.getElementById('themeToggle').addEventListener('click', function() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    this.textContent = next === 'dark' ? '☀️' : '🌙';
  });
})();
</script>

<main class="page-wrap">
  {% block content %}{% endblock %}
</main>

</body>
</html>
